<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Message</title>
    <style>
        #welcomeBanner {
            background-color: blue;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .highlight {
            background-color: yellow;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="welcomeBanner">
        <h1>Welcome User!</h1>
        <p>
            Enjoy our 
            <span style="color: red; font-weight: bold;">
                Special Offer
            </span>
            available today.
        </p>
    </div>
    <p class="highlight">This text is highlighted for emphasis.</p>

</body>
</html>
