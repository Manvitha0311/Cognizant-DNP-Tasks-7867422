<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Event Gallery</title>

    <style>
        table {
            width: 90%;
            margin: auto;
            border-collapse: collapse;
            text-align: center;
        }

        td {
            padding: 10px;
        }

        .img-style {
            width: 200px;
            height: 150px;
            border: 3px solid blue;
            border-radius: 8px;
        }

        caption {
            font-size: 24px;
            font-weight: bold;
            margin: 10px;
        }
    </style>
</head>
<body>

    <table border="1">

        <caption>Community Events Gallery</caption>

        <!-- Row 1 -->
        <tr>
            <td>
                <img src="event1.jpg" 
                     alt="Music Event"
                     title="Music Festival"
                     class="img-style">
                <p>Music Festival</p>
            </td>

            <td>
                <img src="event2.jpg" 
                     alt="Sports Event"
                     title="Sports Meet"
                     class="img-style">
                <p>Sports Meet</p>
            </td>

            <td>
                <img src="event3.jpg" 
                     alt="Art Exhibition"
                     title="Art Exhibition"
                     class="img-style">
                <p>Art Exhibition</p>
            </td>
        </tr>

        <!-- Row 2 -->
        <tr>
            <td>
                <img src="event4.jpg" 
                     alt="Dance Program"
                     title="Dance Program"
                     class="img-style">
                <p>Dance Program</p>
            </td>

            <td>
                <img src="event5.jpg" 
                     alt="Food Festival"
                     title="Food Festival"
                     class="img-style">
                <p>Food Festival</p>
            </td>

            <td>
                <img src="event6.jpg" 
                     alt="Workshop"
                     title="Workshop Session"
                     class="img-style">
                <p>Workshop Session</p>
            </td>
        </tr>

    </table>

</body>
</html>
